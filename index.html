<script>
function addToCart(name, price, image) {

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    let existingItem = cart.find(item => item.name === name);

    if (existingItem) {
        existingItem.quantity++;
    } else {
        cart.push({
            name: name,
            price: price,
            image: image,
            quantity: 1
        });
    }
    localStorage.setItem("cart", JSON.stringify(cart));
    showMessage(); 
    updateQuantity(name); 
}
function showMessage() {

    let message = document.getElementById("cartMessage");

    message.classList.remove("d-none");

    setTimeout(() => {
        message.classList.add("d-none");
    }, 2000); }
function updateQuantity(name){
     let cart = JSON.parse(localStorage.getItem("cart")) || [];
     let item = cart.find(product => product.name === name);
    if(item){
    document.getElementById("quantity"+name).innerText =`Qty: ${item.quantity}`;
    }
}
 
  window.onload=function(){
    updateQuantity("frenchfries");
    updateQuantity("Ice Cream")
    updateQuantity("CupCakes")
  }
   
</script>
