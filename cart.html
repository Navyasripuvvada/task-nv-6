<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>Cart</title>
    <style>
        body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      padding: 20px;
    }

    h2 {
      text-align: center;
    }

    .cart-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 8px;
   }

.cart-item img {
    width: 100px;
    height: 80px;
    object-fit: cover;
    border-radius: 6px;
}

.item-details {
    flex: 1;
    margin-left: 15px;
}

.quantity {
    display: flex;
    align-items: center;
}

.quantity button {
    padding: 5px 10px;
    font-size: 16px;
    cursor: pointer;
}

.quantity span {
    margin: 0 10px;
}

.bill-section {
    background: white;
    padding: 15px;
    border-radius: 8px;
    margin-top: 20px;
}

.order-btn {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    background-color: green;
    color: white;
    font-size: 16px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.order-btn:hover {
    background-color: darkgreen;
}

    </style>
</head>
<body>
   <h2>Your Cart</h2>

<div id="cartContainer"></div>  

<div class="bill-section">
    <p>Subtotal: ₹ <span id="subtotal">0</span></p>
    <p>GST (5%): ₹ <span id="gst">0</span></p>
    <p>Convenience Fee: ₹ <span id="fee">20</span></p>
    <p>Delivery Charge: ₹ <span id="delivery">40</span></p>
    <hr>
    <h3>Total: ₹ <span id="total">0</span></h3>
</div>

<button class="order-btn" onclick="placeOrder()">Place Order</button>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

let container = document.getElementById("cartContainer");

function displayCart() {
    container.innerHTML = "";
    let subtotal = 0;

    cart.forEach((item, index) => {

        subtotal += item.price * item.quantity;

        let div = document.createElement("div");
        div.classList.add("cart-item");

        div.innerHTML = `
            <img src="${item.image}" alt="${item.name}">
            <div class="item-details">
                <h4>${item.name}</h4>
                <p>Price: ₹${item.price}</p>
                <p>Total: ₹${item.price * item.quantity}</p>
            </div>

            <div class="quantity">
                <button onclick="decreaseQty(${index})">-</button>
                <span>${item.quantity}</span>
                <button onclick="increaseQty(${index})">+</button>
            </div>
        `;

        container.appendChild(div);
    });

    updateBill(subtotal);
}

function increaseQty(index) {
    cart[index].quantity++;
    localStorage.setItem("cart", JSON.stringify(cart));
    displayCart();
}

function decreaseQty(index) {
    if (cart[index].quantity > 1) {
        cart[index].quantity--;
    } else {
        cart.splice(index, 1);
    }

    localStorage.setItem("cart", JSON.stringify(cart));
    displayCart();
}

function updateBill(subtotal) {

    let gst = subtotal * 0.05;
    let fee = subtotal > 0 ? 20 : 0;
    let delivery = subtotal > 0 ? 40 : 0;
    let total = subtotal + gst + fee + delivery;

    let subtotalEl = document.getElementById("subtotal");
    let gstEl = document.getElementById("gst");
    let totalEl = document.getElementById("total");

    if (subtotalEl && gstEl && totalEl) {
        subtotalEl.innerText = subtotal.toFixed(2);
        gstEl.innerText = gst.toFixed(2);
        totalEl.innerText = total.toFixed(2);
    }
}
function placeOrder() {
    if (cart.length === 0) {
        alert("Cart is empty!");
        return;
    }

    localStorage.removeItem("cart");
    window.location.href = "orderplaced.html";
}

displayCart();
</script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
